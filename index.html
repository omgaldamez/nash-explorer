<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nash — Keyword Explorer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07001a; font-family: 'Courier New', monospace; color: #aaa; overflow-x: hidden; }

/* ── LOADING ─────────────────────────────────────────── */
#loading {
  position: fixed; inset: 0; background: #07001a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 16px; transition: opacity .5s;
}
#loading-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #ffffff44; }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid #ffffff10; border-top-color: #cc44ff;
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#error-msg {
  display: none; color: #ff4455; font-size: 10px;
  letter-spacing: 1.5px; text-align: center;
  max-width: 400px; line-height: 1.8; padding: 0 20px;
}

/* ── STICKY CHART ────────────────────────────────────── */
#cw {
  position: sticky; top: 0; height: 272px;
  background: #07001a; border-bottom: 1px solid #ffffff09; z-index: 10;
  overflow: hidden;
}
#ctrl {
  position: absolute; top: 10px; left: 14px;
  display: flex; align-items: center; gap: 10px; z-index: 5;
}
select {
  background: #10001c; border: 1px solid #ffffff18; color: #cc55ff;
  padding: 4px 9px; font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 1.5px; cursor: pointer;
  outline: none; text-transform: uppercase;
}
select option { background: #10001c; }
#klbl { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; transition: color .4s; }

/* ── VIEW TOGGLE ─────────────────────────────────────── */
#view-toggle { display: flex; gap: 2px; }
#view-toggle button {
  background: #10001c; border: 1px solid #ffffff18; color: #ffffff44;
  padding: 4px 9px; font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 1.5px; cursor: pointer;
  text-transform: uppercase; outline: none;
  transition: color .2s, border-color .2s, background .2s;
}
#view-toggle button.active {
  color: #cc55ff; border-color: #cc55ff44; background: #1e003a;
}

#stats {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  font-size: 9px; letter-spacing: 2px; color: #ffffff1a;
  text-transform: uppercase; white-space: nowrap; pointer-events: none;
}
#leg {
  position: absolute; top: 8px; right: 14px;
  display: flex; flex-direction: column; gap: 3px; z-index: 5;
}
.li { display: flex; align-items: center; gap: 6px; cursor: pointer; transition: opacity .35s; }
.ld { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.lt { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

/* p5 canvas absolute-fills the chart div */
#cw canvas { position: absolute; top: 0; left: 0; }

/* ── SCROLL SECTIONS ─────────────────────────────────── */
.sec {
  height: 320px; padding: 38px 52px;
  border-top: 1px solid #ffffff06;
  display: flex; align-items: center;
  transition: background .5s, border-left-color .5s;
  border-left: 2px solid transparent;
}
.stag  { font-size: 9px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 12px; opacity: .55; }
.stit  { font-size: 27px; font-weight: bold; margin-bottom: 14px; line-height: 1.1; }
.sbody { font-size: 12px; line-height: 1.85; color: #ffffff18; max-width: 340px; }

/* ── TOOLTIP ─────────────────────────────────────────── */
#tooltip {
  position: fixed; pointer-events: none;
  background: #1a003a; border: 1px solid #ffffff18;
  padding: 10px 14px; font-size: 10px; line-height: 1.7;
  max-width: 280px; z-index: 500; opacity: 0;
  transition: opacity .15s; letter-spacing: .5px;
}
#tooltip .t-frase  { color: #ffffffcc; margin-bottom: 6px; font-style: italic; }
#tooltip .t-meta   { color: #ffffff44; font-size: 9px; }

body::-webkit-scrollbar { width: 3px; }
body::-webkit-scrollbar-thumb { background: #ffffff18; border-radius: 2px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Cargando datos...</div>
  <div id="error-msg"></div>
</div>

<div id="tooltip">
  <div class="t-frase" id="t-frase"></div>
  <div class="t-meta"  id="t-meta"></div>
</div>

<div id="cw">
  <div id="ctrl">
    <select id="sel"><option value="-1">◈ Todos los keywords</option></select>
    <span id="klbl"></span>
    <div id="view-toggle">
      <button id="btn-month" class="active">Meses</button>
      <button id="btn-day">Días</button>
    </div>
  </div>
  <div id="stats"></div>
  <div id="leg"></div>
  <!-- p5 canvas injected here -->
</div>
<div id="sections"></div>
<div style="height: 480px;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>

/* ══════════════════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════════════════ */
const MAX_KW  = 8;
const PALETTE = ['#ff00cc','#00e5a0','#ffaa00','#ff4455','#4499ff','#bb44ff','#ff8844','#00ccff'];
const MES_ES  = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

// Pre-parse palette to RGB for p5
const PAL_RGB = PALETTE.map(h => ({
  r: parseInt(h.slice(1,3),16),
  g: parseInt(h.slice(3,5),16),
  b: parseInt(h.slice(5,7),16)
}));

const TEXTS = {
  intro: 'Fragmentos de conferencias de prensa indexados por keyword y fecha. Desplázate para explorar cada tema o filtra desde el dropdown.',
};

/* ══════════════════════════════════════════════════════
   CARGA CSV
   ══════════════════════════════════════════════════════ */
async function loadData() {
  const res = await fetch('data/db_frases.csv');
  if (!res.ok) throw new Error(`No se pudo cargar el CSV (${res.status})`);
  const text = await res.text();
  const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
  return data
    .map(r => ({
      keyword : (r.keywords || '').trim().toLowerCase(),
      fecha   : (r.fecha || '').trim(),
      subject : (r.subject || '').trim(),
      score   : +(r.puntuacion_total) || 0,
      frase   : (r.frase || '').trim(),
    }))
    .filter(r => r.score >= 2 && r.keyword && r.fecha);
}

/* ══════════════════════════════════════════════════════
   PROCESAMIENTO
   ══════════════════════════════════════════════════════ */
function parseDate(fecha) {
  const [d, m, y] = fecha.split('/');
  if (!d || !m || !y) return null;
  return new Date(+y, +m - 1, +d);
}

function monthRange(start, end) {
  const months = [];
  const cur = new Date(start.getFullYear(), start.getMonth(), 1);
  const last = new Date(end.getFullYear(), end.getMonth(), 1);
  while (cur <= last) { months.push(new Date(cur)); cur.setMonth(cur.getMonth() + 1); }
  return months;
}

function processData(raw) {
  const kwCount = {};
  raw.forEach(p => {
    const kk = p.keyword;
    if (kk) kwCount[kk] = (kwCount[kk] || 0) + 1;
  });
  const KW = Object.entries(kwCount).sort((a,b)=>b[1]-a[1]).slice(0,MAX_KW).map(([k])=>k);

  const moSet = new Set();
  raw.forEach(p => {
    const pts = p.fecha.split('/');
    if (pts.length === 3) moSet.add(`${pts[2]}-${pts[1].padStart(2,'0')}`);
  });
  const MO_KEYS  = [...moSet].sort();
  const MO_LABEL = MO_KEYS.map(k => { const [y,m]=k.split('-'); return `${MES_ES[+m-1]} ${y.slice(2)}`; });

  const daySet = new Set();
  raw.forEach(p => { const d=parseDate(p.fecha); if(d) daySet.add(d.getTime()); });
  const DAY_KEYS = [...daySet].sort((a,b)=>a-b).map(t=>new Date(t));

  const rng = makeRng(42);
  const dots = [];
  raw.forEach(p => {
    const ki = KW.indexOf(p.keyword);
    if (ki < 0) return;
    const pts = p.fecha.split('/');
    if (pts.length < 3) return;
    const moKey  = `${pts[2]}-${pts[1].padStart(2,'0')}`;
    const mi     = MO_KEYS.indexOf(moKey);
    if (mi < 0) return;
    const dateObj = parseDate(p.fecha);
    if (!dateObj) return;
    dots.push({ id:dots.length, ki, mi, dateObj, rx:rng()-.5, ry:rng(),
      score:p.score, frase:p.frase, fecha:p.fecha, subject:p.subject });
  });

  const SECS = [
    { kw:-1, tag:'Panorama general', title:'Nash — Análisis de discurso', body: TEXTS.intro },
    ...KW.map((kw,i) => ({ kw:i, tag:`${kwCount[kw]} fragmentos`,
      title: kw.charAt(0).toUpperCase()+kw.slice(1),
      body: TEXTS[kw]||'Lorem ipsum dolor sit amet consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.' }))
  ];

  return { KW, MO_LABEL, MO_KEYS, DAY_KEYS, dots, SECS, kwCount };
}

function makeRng(seed) {
  let s = seed|0;
  return () => {
    s = (s+0x6D2B79F5)|0;
    let t = Math.imul(s^s>>>15,1|s);
    t = (t+Math.imul(t^t>>>7,61|t))^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

/* ══════════════════════════════════════════════════════
   VIZ — p5 sketch
   ══════════════════════════════════════════════════════ */
function initViz({ KW, MO_LABEL, MO_KEYS, DAY_KEYS, dots, SECS, kwCount }) {
  const CL = KW.map((_,i) => PALETTE[i % PALETTE.length]);
  let viewMode = 'month';
  let curKw    = -1;

  /* ── Secciones de scroll ── */
  const secEl = document.getElementById('sections');
  SECS.forEach((s, i) => {
    const c = s.kw>=0 ? CL[s.kw] : '#ffffff44';
    const d = document.createElement('div');
    d.className='sec'; d.dataset.i=i;
    d.style.borderLeftColor = s.kw>=0 ? CL[s.kw]+'22' : 'transparent';
    d.innerHTML = `<div>
      <div class="stag" style="color:${c}">${s.tag}</div>
      <div class="stit" style="color:${c}">${s.title}</div>
      <div class="sbody">${s.body}</div>
    </div>`;
    secEl.appendChild(d);
  });

  /* ── Leyenda + Dropdown ── */
  const leg = document.getElementById('leg');
  const sel = document.getElementById('sel');
  KW.forEach((kw, i) => {
    const li = document.createElement('div');
    li.className='li'; li.id=`li${i}`;
    li.innerHTML=`<div class="ld" style="background:${CL[i]}"></div><span class="lt" style="color:${CL[i]}">${kw}</span>`;
    li.onclick = () => { sel.value=i; applyFilter(i); };
    leg.appendChild(li);
    const o=document.createElement('option'); o.value=i; o.textContent=`● ${kw}`; sel.appendChild(o);
  });

  function updateStats() {
    const lbl = viewMode==='month' ? `${MO_LABEL.length} meses` : `${DAY_KEYS.length} días`;
    document.getElementById('stats').textContent = `${dots.length.toLocaleString()} fragmentos · ${lbl}`;
  }
  updateStats();

  /* ── Tooltip helpers ── */
  const tip = document.getElementById('tooltip');
  function showTip(dot, mx, my) {
    document.getElementById('t-frase').textContent = `"${dot.frase.slice(0,120)}${dot.frase.length>120?'...':''}"`;
    document.getElementById('t-meta').textContent  = `${dot.fecha} · ${dot.subject} · score ${dot.score}`;
    tip.style.left    = `${Math.min(mx+14, window.innerWidth-300)}px`;
    tip.style.top     = `${my-60}px`;
    tip.style.opacity = 1;
  }
  function hideTip() { tip.style.opacity = 0; }

  /* ══════════════════════════════════════════════════
     p5 SKETCH (instance mode)
     ══════════════════════════════════════════════════ */
  const cwEl = document.getElementById('cw');
  const M    = { top:32, right:14, bottom:38, left:10 };
  const NUM_PARTICLES = 90;

  // Dot state: current position/alpha + targets for lerp
  dots.forEach(d => {
    d.cx = Math.random() * cwEl.clientWidth;
    d.cy = Math.random() * cwEl.clientHeight;
    d.tx = d.cx; d.ty = d.cy;
    d.alpha = 0; d.targetAlpha = 120;
    d.r    = 2.5;
  });

  // ── Scale helpers (no D3) ──────────────────────────
  function computeTargets(W, H) {
    if (viewMode === 'month') {
      const n  = MO_LABEL.length;
      const bw = (W - M.left - M.right) / n;
      dots.forEach(d => {
        d.tx = M.left + d.mi * bw + bw/2 + d.rx * bw * .58;
        d.ty = M.top + 4 + d.ry * (H - M.top - M.bottom - 8);
      });
    } else {
      const dateMin = DAY_KEYS[0].getTime();
      const dateMax = DAY_KEYS[DAY_KEYS.length-1].getTime();
      const span    = dateMax - dateMin || 1;
      const xLeft   = M.left + 28, xRight = W - M.right - 28;
      dots.forEach(d => {
        d.tx = xLeft + (d.dateObj.getTime()-dateMin)/span*(xRight-xLeft) + d.rx*3;
        d.ty = M.top + 4 + d.ry * (H - M.top - M.bottom - 8);
      });
    }
  }

  new p5(p => {

    // ── Background particles ──────────────────────────
    class Particle {
      constructor() { this.reset(p.width, p.height, true); }
      reset(W, H, rand) {
        this.x  = rand ? Math.random()*W : (Math.random()<.5?-2:W+2);
        this.y  = Math.random()*H;
        this.vx = (Math.random()-.5) * .35;
        this.vy = (Math.random()-.5) * .25;
        this.r  = Math.random()*1.2+.3;
        this.ki = Math.floor(Math.random()*KW.length);
        this.alpha = Math.random()*35+8;
        this.life = Math.random()*400+200;
        this.age  = 0;
      }
      update(W, H) {
        this.x += this.vx; this.y += this.vy; this.age++;
        if (this.age > this.life) this.reset(W, H, false);
      }
      draw(p) {
        const rgb = PAL_RGB[this.ki];
        const fade = this.age < 30 ? this.age/30 : this.age > this.life-30 ? (this.life-this.age)/30 : 1;
        const a = this.alpha * fade;
        p.drawingContext.shadowBlur  = 6;
        p.drawingContext.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},0.5)`;
        p.fill(rgb.r, rgb.g, rgb.b, a);
        p.noStroke();
        p.circle(this.x, this.y, this.r*2);
        p.drawingContext.shadowBlur = 0;
      }
    }

    let particles = [];
    let W, H;

    p.setup = () => {
      const cnv = p.createCanvas(cwEl.clientWidth, cwEl.clientHeight);
      cnv.style('position','absolute');
      cnv.style('top','0'); cnv.style('left','0');
      p.pixelDensity(Math.min(window.devicePixelRatio, 2));
      W = p.width; H = p.height;
      for (let i=0; i<NUM_PARTICLES; i++) particles.push(new Particle());
      computeTargets(W, H);
      // Scatter dots from random spawn positions toward targets
      dots.forEach(d => { d.cx=W*.5+(.5-Math.random())*W*.4; d.cy=H*.5+(.5-Math.random())*H*.4; });
    };

    // ── Axis drawing ──────────────────────────────────
    function drawAxis() {
      p.textFont('Courier New');
      p.textSize(Math.max(7.5, Math.min(10, W/170)));
      p.noStroke();

      if (viewMode === 'month') {
        const n  = MO_LABEL.length;
        const bw = (W - M.left - M.right) / n;
        for (let i=0; i<n; i++) {
          const x = M.left + i*bw;
          if (i%2===0) {
            p.fill(255,255,255,5);
            p.rect(x, M.top, bw, H-M.top-M.bottom);
          }
          p.fill(255,255,255,28);
          p.textAlign(p.CENTER);
          p.text(MO_LABEL[i], x+bw/2, H-M.bottom+14);
        }
      } else {
        const dateMin = DAY_KEYS[0];
        const dateMax = DAY_KEYS[DAY_KEYS.length-1];
        const span    = dateMax-dateMin || 1;
        const xLeft   = M.left+28, xRight = W-M.right-28;
        const months  = monthRange(dateMin, dateMax);
        months.forEach((mo, i) => {
          const x = xLeft + (mo.getTime()-dateMin)/span*(xRight-xLeft);
          if (i%2===0 && i+1<months.length) {
            const xn = xLeft + (months[i+1].getTime()-dateMin)/span*(xRight-xLeft);
            p.fill(255,255,255,5);
            p.rect(x, M.top, xn-x, H-M.top-M.bottom);
          }
          if (x>M.left+8 && x<W-M.right-8) {
            p.stroke(255,255,255,10); p.strokeWeight(1);
            p.line(x, M.top, x, H-M.bottom);
            p.noStroke();
          }
          p.fill(255,255,255,28);
          p.textAlign(p.LEFT);
          p.text(`${MES_ES[mo.getMonth()]} ${String(mo.getFullYear()).slice(2)}`, x+4, H-M.bottom+14);
        });
      }
    }

    // ── Data dot drawing ─────────────────────────────
    function drawDots() {
      p.noStroke();
      dots.forEach(d => {
        // lerp toward target
        d.cx = p.lerp(d.cx, d.tx, .055);
        d.cy = p.lerp(d.cy, d.ty, .055);
        d.alpha = p.lerp(d.alpha, d.targetAlpha, .07);

        if (d.alpha < 1) return;
        const rgb = PAL_RGB[d.ki];
        const glowA  = d.targetAlpha > 100 ? .7 : .2;
        const glowSz = d.targetAlpha > 100 ? 10 : 3;
        p.drawingContext.shadowBlur  = glowSz;
        p.drawingContext.shadowColor = `rgba(${rgb.r},${rgb.g},${rgb.b},${glowA})`;
        p.fill(rgb.r, rgb.g, rgb.b, d.alpha);
        p.circle(d.cx, d.cy, d.r*2);
      });
      p.drawingContext.shadowBlur = 0;
    }

    // ── Hover detection ──────────────────────────────
    let hoveredDot = null;
    p.mouseMoved = () => {
      if (p.mouseY<0||p.mouseY>H||p.mouseX<0||p.mouseX>W) { hideTip(); return; }
      let best=null, bestD=10;
      for (const d of dots) {
        if (d.targetAlpha < 10) continue;
        const dist = Math.hypot(p.mouseX-d.cx, p.mouseY-d.cy);
        if (dist < bestD) { bestD=dist; best=d; }
      }
      if (best !== hoveredDot) {
        hoveredDot = best;
        if (best) showTip(best, p.mouseX + cwEl.getBoundingClientRect().left, p.mouseY + cwEl.getBoundingClientRect().top);
        else hideTip();
      }
    };

    p.draw = () => {
      p.background(7, 0, 26);
      drawAxis();
      particles.forEach(pt => { pt.update(W, H); pt.draw(p); });
      drawDots();
    };

    p.windowResized = () => {
      W = cwEl.clientWidth; H = cwEl.clientHeight;
      p.resizeCanvas(W, H);
      computeTargets(W, H);
    };

  }, cwEl);

  /* ── Filter / highlight ──────────────────────────── */
  function applyFilter(kw) {
    if (kw === curKw) return; curKw = kw;
    const lbl = document.getElementById('klbl');
    lbl.textContent = kw>=0 ? KW[kw] : '';
    lbl.style.color = kw>=0 ? CL[kw]+'88' : '';

    // dot visibility
    dots.forEach(d => {
      d.targetAlpha = (kw===-1 || d.ki===kw) ? 200 : 8;
    });

    // section highlights
    KW.forEach((_,i) => { const e=document.getElementById(`li${i}`); if(e) e.style.opacity=(kw===-1||i===kw)?1:.22; });
    document.querySelectorAll('.sec').forEach((s,i) => {
      const sk=SECS[i].kw;
      s.style.background      = i===kw+1 ? CL[sk]+'09' : 'transparent';
      s.style.borderLeftColor = i===kw+1 ? CL[sk]+'77' : sk>=0 ? CL[sk]+'22' : 'transparent';
    });
  }

  function switchView(mode) {
    if (mode===viewMode) return;
    viewMode = mode;
    document.getElementById('btn-month').classList.toggle('active', mode==='month');
    document.getElementById('btn-day').classList.toggle('active',   mode==='day');
    updateStats();
    computeTargets(cwEl.clientWidth, cwEl.clientHeight);
  }

  /* ── Events ──────────────────────────────────────── */
  sel.addEventListener('change', () => applyFilter(parseInt(sel.value)));
  document.getElementById('btn-month').addEventListener('click', () => switchView('month'));
  document.getElementById('btn-day').addEventListener('click',   () => switchView('day'));

  const SH=320;
  window.addEventListener('scroll', () => {
    const idx = Math.min(Math.floor(window.scrollY/SH), SECS.length-1);
    const kw  = SECS[idx].kw; sel.value=kw; applyFilter(kw);
  });

  // Initial reveal
  setTimeout(() => applyFilter(-1), 100);
}

/* ══════════════════════════════════════════════════════
   BOOTSTRAP
   ══════════════════════════════════════════════════════ */
(async () => {
  try {
    document.getElementById('loading-text').textContent = 'Cargando CSV...';
    const raw       = await loadData();
    const processed = processData(raw);
    document.getElementById('loading').style.opacity = 0;
    setTimeout(() => document.getElementById('loading').style.display='none', 500);
    initViz(processed);
  } catch (err) {
    document.getElementById('loading-text').textContent = 'Error al cargar';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent   = err.message;
    document.querySelector('.spinner').style.display   = 'none';
  }
})();

</script>
</body>
</html>
