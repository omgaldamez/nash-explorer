<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nash — Keyword Explorer</title>
<style>
/* ══ CSS VARIABLES — DARK (default) ══════════════════════ */
:root {
  --bg:        #07001a;
  --surface:   #10001c;
  --surface2:  #1e003a;
  --surface3:  #001a12;
  --border:    rgba(255,255,255,0.08);
  --border-hi: rgba(255,255,255,0.16);
  --txt:       #c8b8e0;
  --txt-hi:    rgba(255,255,255,0.88);
  --txt-mid:   rgba(255,255,255,0.65);
  --txt-lo:    rgba(255,255,255,0.42);
  --txt-dim:   #9988bb;
  --accent:    #cc55ff;
  --accent-bg: #1e003a;
  --green:     #00e5a0;
  --green-bg:  #001a12;
  --err:       #ff4455;
  --p5-bg-r:7; --p5-bg-g:0; --p5-bg-b:26;
  --p5-txt-r:255; --p5-txt-g:255; --p5-txt-b:255;
}
/* ══ LIGHT THEME ════════════════════════════════════════ */
[data-theme="light"] {
  --bg:        #f2eefa;
  --surface:   #ffffff;
  --surface2:  #e8deff;
  --surface3:  #d6f5ea;
  --border:    rgba(0,0,0,0.09);
  --border-hi: rgba(0,0,0,0.18);
  --txt:       #4a3068;
  --txt-hi:    #12002a;
  --txt-mid:   #3a2255;
  --txt-lo:    #6a5088;
  --txt-dim:   #9880b8;
  --accent:    #7700cc;
  --accent-bg: #e8deff;
  --green:     #007755;
  --green-bg:  #d6f5ea;
  --err:       #cc1133;
  --p5-bg-r:242; --p5-bg-g:238; --p5-bg-b:250;
  --p5-txt-r:30;  --p5-txt-g:0;   --p5-txt-b:60;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); font-family: 'Courier New', monospace;
  color: var(--txt); overflow-x: hidden;
  transition: background .35s, color .35s;
}

#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999; gap: 16px; transition: opacity .5s;
}
#loading-text { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--txt-dim); }
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#error-msg {
  display: none; color: var(--err); font-size: 10px;
  letter-spacing: 1.5px; text-align: center;
  max-width: 400px; line-height: 1.8; padding: 0 20px;
}

/* ── STICKY WRAPPER ──────────────────────────────────── */
#cw {
  position: sticky; top: 69px; /* tab-bar ~33px + toolbar ~36px */
  background: var(--bg); border-bottom: 1px solid var(--border);
  z-index: 10; overflow: hidden;
  display: flex; flex-direction: column;
  transition: background .35s;
}

/* ── TOOLBAR ─────────────────────────────────────────── */
#toolbar {
  display: flex; align-items: center; flex-wrap: wrap;
  gap: 6px; padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg); z-index: 15; flex-shrink: 0;
  position: sticky; top: 33px; /* justo debajo del tab-bar */
  transition: background .35s;
}
#toolbar-left  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; flex: 1; min-width: 0; }
#toolbar-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }

select {
  background: var(--surface); border: 1px solid var(--border-hi); color: var(--accent);
  padding: 4px 9px; font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 1.5px; cursor: pointer;
  outline: none; text-transform: uppercase; max-width: 160px;
}
select option { background: var(--surface); }
#klbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--txt-lo); transition: color .4s; white-space: nowrap; }

#view-toggle, #mode-toggle { display: flex; gap: 2px; }
#view-toggle button, #mode-toggle button {
  background: var(--surface); border: 1px solid var(--border-hi); color: var(--txt-lo);
  padding: 4px 8px; font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 1px; cursor: pointer;
  text-transform: uppercase; outline: none;
  transition: color .2s, border-color .2s, background .2s;
  white-space: nowrap;
}
#view-toggle button.active { color: var(--accent); border-color: var(--accent); background: var(--accent-bg); }
#mode-toggle button.active  { color: var(--green); border-color: var(--green); background: var(--green-bg); }

#stats {
  font-size: 9px; letter-spacing: 2px; color: var(--txt-mid);
  text-transform: uppercase; white-space: nowrap; pointer-events: none;
}

/* ── CHART AREA ──────────────────────────────────────── */
#chart-area { position: relative; height: 305px; flex-shrink: 0; }
#chart-area canvas { position: absolute; top: 0; left: 0; }

/* ── LEYENDA ─────────────────────────────────────────── */
#leg {
  display: flex; flex-direction: row; flex-wrap: wrap;
  justify-content: center;
  gap: 4px 14px; padding: 7px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg); flex-shrink: 0; z-index: 5;
}
.li { display: flex; align-items: center; gap: 5px; cursor: pointer; transition: opacity .35s; }
.ld { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.lt { font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }

/* ── SECTIONS ────────────────────────────────────────── */
.sec {
  height: 380px; padding: 38px 52px;
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  transition: background .5s, border-left-color .5s;
  border-left: 2px solid transparent;
}
.stag  { font-size: 9px; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 12px; color: var(--txt-lo); }
.stit  { font-size: 27px; font-weight: bold; margin-bottom: 14px; line-height: 1.1; }
.sbody { font-size: 12px; line-height: 1.85; color: var(--txt-mid); max-width: 340px; }

/* ── HOVER TOOLTIP (pequeño, on-hover) ───────────────── */
#tooltip {
  position: fixed; pointer-events: none;
  background: var(--surface2); border: 1px solid var(--border-hi);
  padding: 10px 14px; font-size: 10px; line-height: 1.7;
  max-width: 260px; z-index: 500; opacity: 0;
  transition: opacity .15s; letter-spacing: .5px;
}
#tooltip .t-frase { color: var(--txt-hi); margin-bottom: 4px; font-style: italic; }
#tooltip .t-meta  { color: var(--txt-lo); font-size: 9px; }

/* ── DOT MODAL (on-click, info completa) ─────────────── */
#dot-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.55); z-index: 600;
  align-items: center; justify-content: center;
  padding: 20px;
}
#dot-modal-overlay.open { display: flex; }
#dot-modal {
  background: var(--surface); border: 1px solid var(--border-hi);
  max-width: 520px; width: 100%; padding: 24px 28px;
  position: relative; max-height: 80vh; overflow-y: auto;
}
#dot-modal-close {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; color: var(--txt-lo);
  font-family: 'Courier New', monospace; font-size: 10px;
  letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; transition: color .2s;
}
#dot-modal-close:hover { color: var(--txt-hi); }
#dot-modal-kw {
  font-size: 8px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 12px;
}
#dot-modal-frase {
  font-size: 13px; line-height: 1.9; color: var(--txt-hi);
  font-style: italic; margin-bottom: 18px;
  border-left: 2px solid var(--accent); padding-left: 14px;
}
#dot-modal-meta {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px 20px; font-size: 9px; letter-spacing: 1px;
}
.dm-row { display: flex; flex-direction: column; gap: 2px; }
.dm-label { text-transform: uppercase; color: var(--txt-dim); font-size: 8px; letter-spacing: 2px; }
.dm-val   { color: var(--txt-mid); }

/* ── TAB BAR ─────────────────────────────────────────── */
#tab-bar {
  position: sticky; top: 0; z-index: 20;
  display: flex; align-items: stretch;
  background: var(--bg); border-bottom: 1px solid var(--border-hi);
  transition: background .35s;
}
.tab-btn {
  flex: 1; padding: 11px 0; text-align: center;
  font-family: 'Courier New', monospace; font-size: 9px;
  letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--txt-lo); background: none; border: none;
  cursor: pointer; transition: color .2s, border-bottom .2s;
  border-bottom: 2px solid transparent;
}
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
#theme-toggle {
  padding: 0 16px; background: none; border: none;
  border-left: 1px solid var(--border);
  color: var(--txt-lo); font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  cursor: pointer; transition: color .2s; white-space: nowrap;
}
#theme-toggle:hover { color: var(--txt-hi); }

/* ── PANELS ──────────────────────────────────────────── */
#panel-explore { display: block; }
#panel-query   { display: none; min-height: 100vh; padding: 24px 20px 60px; max-width: 780px; margin: 0 auto; }

/* ── RAG INPUT ───────────────────────────────────────── */
#rag-form { display: flex; gap: 8px; margin-bottom: 12px; }
#rag-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border-hi);
  color: var(--txt-hi); padding: 10px 14px;
  font-family: 'Courier New', monospace; font-size: 11px;
  letter-spacing: .5px; outline: none; transition: border-color .2s;
}
#rag-input:focus { border-color: var(--accent); }
#rag-input::placeholder { color: var(--txt-dim); }
#rag-btn {
  background: var(--accent-bg); border: 1px solid var(--accent); color: var(--accent);
  padding: 10px 18px; font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; white-space: nowrap; transition: background .2s;
}
#rag-btn:hover { opacity: .8; }
#rag-btn:disabled { opacity: .35; cursor: not-allowed; }

/* ── CHIPS ───────────────────────────────────────────── */
#rag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 22px; }
.chip {
  background: var(--surface); border: 1px solid var(--border-hi); color: var(--txt-lo);
  padding: 4px 10px; font-family: 'Courier New', monospace;
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: color .2s, border-color .2s;
}
.chip:hover { color: var(--accent); border-color: var(--accent); }

/* ── RAG RESPONSE ────────────────────────────────────── */
#rag-empty {
  margin-top: 48px; text-align: center;
  font-size: 10px; letter-spacing: 2px;
  color: var(--txt-dim); text-transform: uppercase;
}
#rag-spinner { display: none; margin: 48px auto; text-align: center; }
#rag-answer-wrap { display: none; }
#rag-answer {
  font-size: 12px; line-height: 1.9; color: var(--txt-hi);
  white-space: pre-wrap; margin-bottom: 20px;
  border-left: 2px solid var(--accent); padding-left: 16px;
  opacity: 0.9;
}
#sources-toggle {
  background: none; border: none; border-top: 1px solid var(--border);
  color: var(--txt-lo); font-family: 'Courier New', monospace;
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  cursor: pointer; padding: 10px 0; display: block; width: 100%;
  text-align: left; transition: color .2s;
}
#sources-toggle:hover { color: var(--txt-mid); }
#sources-list { display: none; margin-top: 10px; }
.source-item {
  border: 1px solid var(--border); padding: 10px 14px;
  margin-bottom: 8px; font-size: 10px; line-height: 1.7;
}
.source-frase { color: var(--txt-mid); font-style: italic; margin-bottom: 5px; }
.source-meta  { color: var(--txt-lo); font-size: 9px; letter-spacing: .5px; }

/* ── MOBILE ──────────────────────────────────────────── */
@media (max-width: 600px) {
  #toolbar { gap: 5px; padding: 7px 10px; }
  #toolbar-left { gap: 5px; }
  select { max-width: 120px; font-size: 8px; padding: 4px 7px; }
  #view-toggle button, #mode-toggle button { font-size: 8px; padding: 4px 6px; letter-spacing: 0.3px; }
  #stats { display: none; }
  #klbl  { display: none; }
  #chart-area { height: 235px; }
  #cw { top: 62px; }
  #leg { gap: 4px 10px; padding: 6px 10px; }
  .lt  { font-size: 8px; }
  #panel-query { padding: 16px 14px 60px; }
  #rag-answer  { font-size: 11px; }
  #dot-modal-meta { grid-template-columns: 1fr; }
}

body::-webkit-scrollbar { width: 3px; }
body::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">Cargando datos...</div>
  <div id="error-msg"></div>
</div>

<!-- ── TAB BAR ───────────────────────────────────── -->
<div id="tab-bar">
  <button class="tab-btn active" data-tab="explore">◈ Explorar</button>
  <button class="tab-btn"        data-tab="query">⬡ Consultar</button>
  <button id="theme-toggle">Claro</button>
</div>

<!-- ── DOT MODAL ──────────────────────────────────── -->
<div id="dot-modal-overlay">
  <div id="dot-modal">
    <button id="dot-modal-close">cerrar</button>
    <div id="dot-modal-kw"></div>
    <div id="dot-modal-frase"></div>
    <div id="dot-modal-meta">
      <div class="dm-row"><span class="dm-label">Fecha</span><span class="dm-val" id="dm-fecha"></span></div>
      <div class="dm-row"><span class="dm-label">Subject</span><span class="dm-val" id="dm-subject"></span></div>
      <div class="dm-row"><span class="dm-label">Score</span><span class="dm-val" id="dm-score"></span></div>
      <div class="dm-row"><span class="dm-label">Timestamp</span><span class="dm-val" id="dm-ts"></span></div>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="t-frase" id="t-frase"></div>
  <div class="t-meta"  id="t-meta"></div>
</div>

<!-- ── PANEL EXPLORAR ────────────────────────────── -->
<!-- toolbar siempre visible, fuera de panel-explore -->
<div id="toolbar">
  <div id="toolbar-left">
    <select id="sel"><option value="-1">◈ Todos los keywords</option></select>
    <span id="klbl"></span>
    <div id="view-toggle">
      <button id="btn-month" class="active">Meses</button>
      <button id="btn-day">Días</button>
    </div>
    <div id="mode-toggle">
      <button id="btn-kw" class="active">Keywords</button>
      <button id="btn-time">Temporal</button>
    </div>
  </div>
  <div id="toolbar-right">
    <div id="stats"></div>
  </div>
</div>

<div id="panel-explore">
<div id="cw">
  <div id="chart-area"></div>
  <div id="leg"></div>
</div>
<div id="sections"></div>
<div style="height: 480px;"></div>
</div><!-- /panel-explore -->

<!-- ── PANEL CONSULTAR ───────────────────────────── -->
<div id="panel-query">
  <div id="rag-form">
    <input id="rag-input" type="text"
      placeholder="Busca declaraciones... (ej: qué dijo sobre corrupción)"
      autocomplete="off" />
    <button id="rag-btn">Buscar</button>
  </div>

  <div id="rag-chips">
    <span class="chip">frases sobre Trump</span>
    <span class="chip">declaraciones de economía</span>
    <span class="chip">menciones a fentanilo</span>
    <span class="chip">declaraciones más relevantes</span>
  </div>

  <div id="rag-empty">Realiza una consulta para explorar el discurso presidencial</div>

  <div id="rag-spinner">
    <div class="spinner"></div>
  </div>

  <div id="rag-answer-wrap">
    <div id="rag-answer"></div>
    <button id="sources-toggle">▸ Fuentes consultadas</button>
    <div id="sources-list"></div>
  </div>
</div><!-- /panel-query -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
<script>
/* ══════════════════════════════════════════════════════
   CONFIG
   ══════════════════════════════════════════════════════ */
const WORKER_URL = 'https://nash-api.ogaldamez.workers.dev';
const MAX_KW   = 8;
const PALETTE  = ['#ff00cc','#00e5a0','#ffaa00','#ff4455','#4499ff','#bb44ff','#ff8844','#00ccff'];
const PAL_LIGHT= ['#bb0099','#006644','#bb6600','#bb0022','#1155bb','#7722bb','#bb4400','#0088aa'];
const MES_ES   = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function activePalette() {
  return document.documentElement.dataset.theme === 'light' ? PAL_LIGHT : PALETTE;
}
function palRgb(i) {
  const h = activePalette()[i % 8];
  return { r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16) };
}
const TEXTS = {
  intro: 'Fragmentos de conferencias de prensa indexados por keyword y fecha. Desplázate para explorar cada tema o filtra desde el dropdown.',
};

/* ══════════════════════════════════════════════════════
   CARGA — detecta formato nuevo {kw,mo,...} o viejo array
   ══════════════════════════════════════════════════════ */
function makeRng(seed) {
  let s = seed|0;
  return () => {
    s = (s+0x6D2B79F5)|0;
    let t = Math.imul(s^s>>>15,1|s);
    t = (t+Math.imul(t^t>>>7,61|t))^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}

function normalizeOldFormat(arr) {
  // arr: [{keyword, fecha, subject, score, frase}, ...]
  const kwCount = {};
  arr.forEach(p => { const k=p.keyword; if(k) kwCount[k]=(kwCount[k]||0)+1; });
  const KW = Object.entries(kwCount).sort((a,b)=>b[1]-a[1]).slice(0,MAX_KW).map(([k])=>k);
  const kwIdx = Object.fromEntries(KW.map((k,i)=>[k,i]));

  const moSet = new Set();
  arr.forEach(p => {
    const pts = (p.fecha||'').split('/');
    if (pts.length===3) moSet.add(`${pts[2]}-${pts[1].padStart(2,'0')}`);
  });
  const moKeys  = [...moSet].sort();
  const moLabel = moKeys.map(k => { const [y,m]=k.split('-'); return `${MES_ES[+m-1]} ${y.slice(2)}`; });
  const moIdx   = Object.fromEntries(moKeys.map((k,i)=>[k,i]));

  const daySet = new Set();
  arr.forEach(p => {
    const pts=(p.fecha||'').split('/');
    if(pts.length===3){ const ms=Date.UTC(+pts[2],+pts[1]-1,+pts[0]); daySet.add(ms); }
  });
  const dayMs = [...daySet].sort((a,b)=>a-b);

  const rng  = makeRng(42);
  const dots = []; const kwN = new Array(KW.length).fill(0);
  arr.forEach(p => {
    const ki = kwIdx[p.keyword]; if(ki===undefined){ rng(); rng(); return; }
    const pts=(p.fecha||'').split('/'); if(pts.length<3){ rng(); rng(); return; }
    const moKey=`${pts[2]}-${pts[1].padStart(2,'0')}`;
    const mi=moIdx[moKey]; if(mi===undefined){ rng(); rng(); return; }
    const ms=Date.UTC(+pts[2],+pts[1]-1,+pts[0]);
    const rx=rng()-.5, ry=rng();
    kwN[ki]++;
    dots.push([ki, mi, ms, +rx.toFixed(4), +ry.toFixed(4),
      +(p.score||0), p.subject||'', (p.frase||'').slice(0,160)]);
  });

  return { kw: KW, kwN, mo: moLabel, dayMs, dots };
}

async function loadData() {
  const res = await fetch(`${WORKER_URL}/data`);
  if (!res.ok) throw new Error(`Error al obtener datos del servidor (${res.status})`);
  return res.json();
}

/* ══════════════════════════════════════════════════════
   PROCESAMIENTO (mínimo — datos ya vienen pre-calculados)
   ══════════════════════════════════════════════════════ */
function utcMsToFecha(ms) {
  const d = new Date(ms);
  return `${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()}`;
}

function processData({ kw, kwN, mo, dayMs, dots: raw }) {
  const KW       = kw;
  const MO_LABEL = mo;
  const DAY_KEYS = dayMs.map(ms => new Date(ms));

  // Map raw arrays → dot objects. rx/ry/ki/mi ya vienen pre-calculados.
  const dots = raw.map((d, id) => ({
    id,
    ki: d[0], mi: d[1],
    dateObj: new Date(d[2]),
    rx: d[3], ry: d[4],
    score: d[5], subject: d[6], frase: d[7],
    fecha: utcMsToFecha(d[2]),
    // estado de animación (mutable)
    cx: 0, cy: 0, tx: 0, ty: 0,
    alpha: 0, targetAlpha: 0,
  }));

  const SECS = [
    { kw:-1, tag:'Panorama general', title:'Nash — Análisis de discurso', body: TEXTS.intro },
    ...KW.map((k, i) => ({
      kw: i, tag:`${kwN[i]} fragmentos`,
      title: k.charAt(0).toUpperCase()+k.slice(1),
      body: TEXTS[k] || 'Lorem ipsum dolor sit amet consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.',
    }))
  ];

  return { KW, kwN, MO_LABEL, DAY_KEYS, dots, SECS };
}

/* ══════════════════════════════════════════════════════
   VIZ
   ══════════════════════════════════════════════════════ */
function initViz({ KW, kwN, MO_LABEL, DAY_KEYS, dots, SECS }) {
  function CL(i) { return activePalette()[i % 8]; }
  const cwEl     = document.getElementById('cw');
  const chartEl  = document.getElementById('chart-area'); // p5 vive aquí
  let viewMode   = 'month';
  let navMode    = 'kw';      // 'kw' | 'time'
  let curKw      = -99;
  let curMo      = -99;
  let dayStackMo    = -1;     // >= 0 cuando temporal está en detalle de mes
  let _dayAxisParams = null;  // { daysInMonth, bw, MB } — calculado por computeTargetsDayStack
  // top reducido: toolbar ya está fuera del canvas
  const M      = { top:12, right:14, bottom:36, left:10 };

  // Construir secciones temporales a partir de MO_LABEL
  const SECS_TIME = [
    { mo:-1, tag:'Panorama general', title:'Nash — Línea de tiempo',
      body:'Todos los fragmentos ordenados cronológicamente. Desplázate para recorrer mes a mes.' },
    ...MO_LABEL.map((lbl, i) => ({
      mo: i, tag: `${lbl}`,
      title: lbl,
      body: 'Lorem ipsum dolor sit amet consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam quis nostrud exercitation.',
    }))
  ];

  /* ── Render secciones ────────────────────────────── */
  const secEl = document.getElementById('sections');

  function renderSections() {
    secEl.innerHTML = '';
    if (navMode === 'kw') {
      SECS.forEach((s, i) => {
        const c = s.kw>=0 ? CL(s.kw) : (document.documentElement.dataset.theme==='light' ? '#33004488' : '#ffffff44');
        const el = document.createElement('div');
        el.className='sec'; el.dataset.i=i; el.dataset.mode='kw';
        el.style.borderLeftColor = s.kw>=0 ? CL(s.kw)+'22' : 'transparent';
        el.innerHTML=`<div>
          <div class="stag" style="color:${c}">${s.tag}</div>
          <div class="stit" style="color:${c}">${s.title}</div>
          <div class="sbody">${s.body}</div>
        </div>`;
        secEl.appendChild(el);
      });
    } else {
      SECS_TIME.forEach((s, i) => {
        const c = document.documentElement.dataset.theme==='light' ? '#006644' : '#00e5a0';
        const el = document.createElement('div');
        el.className='sec'; el.dataset.i=i; el.dataset.mode='time';
        el.style.borderLeftColor = s.mo>=0 ? c+'22' : 'transparent';
        el.innerHTML=`<div>
          <div class="stag" style="color:${c}88">${s.tag}</div>
          <div class="stit" style="color:${c}">${s.title}</div>
          <div class="sbody">${s.body}</div>
        </div>`;
        secEl.appendChild(el);
      });
    }
  }
  renderSections();
  document.addEventListener('themechange', () => { renderSections(); renderLegend(); });

  /* ── Leyenda + Dropdown ──────────────────────────── */
  const leg = document.getElementById('leg');
  const sel = document.getElementById('sel');
  // Build dropdown options once
  KW.forEach((kw, i) => {
    const o = document.createElement('option');
    o.value=i; o.textContent=`● ${kw}`; sel.appendChild(o);
  });

  function renderLegend() {
    leg.innerHTML = '';
    KW.forEach((kw, i) => {
      const li = document.createElement('div');
      li.className='li'; li.id=`li${i}`;
      li.innerHTML=`<div class="ld" style="background:${CL(i)}"></div><span class="lt" style="color:${CL(i)}">${kw}</span>`;
      li.onclick = () => { sel.value=i; applyFilter(i); };
      leg.appendChild(li);
    });
  }
  renderLegend();

  function updateLegVisibility() {
    leg.style.display  = '';   // siempre visible
    sel.style.display  = navMode==='kw' ? '' : 'none';
    document.getElementById('klbl').style.display = navMode==='kw' ? '' : 'none';
  }

  function updateStats() {
    const lbl = viewMode==='month' ? `${MO_LABEL.length} meses` : `${DAY_KEYS.length} días`;
    document.getElementById('stats').textContent = `${dots.length.toLocaleString()} fragmentos · ${lbl}`;
  }
  updateStats();

  /* ── Tooltip hover ───────────────────────────────── */
  const tip = document.getElementById('tooltip');
  function showTip(d, sx, sy) {
    document.getElementById('t-frase').textContent = `"${d.frase.slice(0,100)}${d.frase.length>100?'...':''}"`;
    document.getElementById('t-meta').textContent  = `${d.fecha} · ${d.subject}`;
    tip.style.left    = `${Math.min(sx+14, window.innerWidth-280)}px`;
    tip.style.top     = `${sy-60}px`;
    tip.style.opacity = 1;
  }
  function hideTip() { tip.style.opacity=0; }

  /* ── Modal al click ──────────────────────────────── */
  const modalOverlay = document.getElementById('dot-modal-overlay');
  function openModal(d) {
    hideTip();
    document.getElementById('dot-modal-kw').textContent     = d.subject || '';
    document.getElementById('dot-modal-frase').textContent  = `"${d.frase}"`;
    document.getElementById('dm-fecha').textContent         = d.fecha;
    document.getElementById('dm-subject').textContent       = d.subject;
    document.getElementById('dm-score').textContent         = d.score;
    document.getElementById('dm-ts').textContent            = d.min_sec || '—';
    modalOverlay.classList.add('open');
  }
  document.getElementById('dot-modal-close').addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

  /* ── Scale helpers ───────────────────────────────── */
  function computeTargets(W, H) {
    if (viewMode === 'month') {
      const bw = (W - M.left - M.right) / MO_LABEL.length;
      dots.forEach(d => {
        d.tx = M.left + d.mi * bw + bw/2 + d.rx * bw * .58;
        d.ty = M.top + 4 + d.ry * (H - M.top - M.bottom - 8);
      });
    } else {
      const t0 = DAY_KEYS[0].getTime(), t1 = DAY_KEYS[DAY_KEYS.length-1].getTime();
      const span = t1 - t0 || 1;
      const xL = M.left+28, xR = W-M.right-28;
      dots.forEach(d => {
        d.tx = xL + (d.dateObj.getTime()-t0)/span*(xR-xL) + d.rx*3;
        d.ty = M.top + 4 + d.ry * (H - M.top - M.bottom - 8);
      });
    }
  }

  function computeTargetsDayStack(mo) {
    const W = chartEl.clientWidth, H = chartEl.clientHeight;
    const MB = 48; // margen bottom extra para etiquetas

    // Agrupar dots del mes por día
    const byDay = {};
    dots.forEach(d => {
      if (d.mi !== mo) return;
      const day = d.dateObj.getUTCDate();
      if (!byDay[day]) byDay[day] = [];
      byDay[day].push(d);
    });
    Object.values(byDay).forEach(arr => arr.sort((a, b) => a.dateObj - b.dateObj));

    // Días reales del mes (1–daysInMonth)
    const sampleDot = dots.find(d => d.mi === mo);
    const daysInMonth = sampleDot
      ? new Date(sampleDot.dateObj.getUTCFullYear(), sampleDot.dateObj.getUTCMonth() + 1, 0).getUTCDate()
      : 31;

    const bw         = (W - M.left - M.right) / daysInMonth;
    const maxStack   = Math.max(...Object.values(byDay).map(a => a.length), 1);
    const availH     = H - M.top - MB - 6;
    const dotSpacing = Math.min(availH / maxStack, 14);
    const stackBottom = H - MB - 2;

    dots.forEach(d => {
      if (d.mi !== mo) return;
      const day   = d.dateObj.getUTCDate();
      const group = byDay[day];
      const idx   = group.indexOf(d);
      d.tx = M.left + (day - 0.5) * bw;
      d.ty = stackBottom - idx * dotSpacing;
    });
    // Guardar para que drawDayAxis use los mismos parámetros
    _dayAxisParams = { daysInMonth, bw: bw, MB };
  }

  function monthRange(start, end) {
    const months=[], cur=new Date(start.getUTCFullYear(), start.getUTCMonth(), 1);
    const last=new Date(end.getUTCFullYear(), end.getUTCMonth(), 1);
    while(cur<=last){ months.push(new Date(cur)); cur.setMonth(cur.getMonth()+1); }
    return months;
  }

  /* ══════════════════════════════════════════════════
     p5 SKETCH
     ══════════════════════════════════════════════════ */
  const NUM_PT = 55;

  new p5(p => {
    // p5 opera sobre chartEl, no sobre cwEl

    /* ── Partículas decorativas ────────────────────── */
    class Particle {
      reset(W, H, scatter) {
        this.x    = scatter ? Math.random()*W : (Math.random()<.5 ? -2 : W+2);
        this.y    = Math.random()*H;
        this.vx   = (Math.random()-.5)*.3;
        this.vy   = (Math.random()-.5)*.22;
        this.r    = Math.random()*1.1+.3;
        this.ki   = Math.floor(Math.random()*KW.length);
        this.base = Math.random()*22+5;
        this.life = Math.random()*500+200;
        this.age  = 0;
      }
      constructor(W, H) { this.reset(W, H, true); }
      update(W, H) {
        this.x+=this.vx; this.y+=this.vy; this.age++;
        if (this.age>this.life) this.reset(W, H, false);
      }
    }

    let particles=[], W, H, DR;
    let hoveredDot = null;

    p.setup = () => {
      const cnv = p.createCanvas(chartEl.clientWidth, chartEl.clientHeight);
      cnv.style('position','absolute'); cnv.style('top','0'); cnv.style('left','0');
      p.pixelDensity(Math.min(window.devicePixelRatio, 2));
      p.frameRate(30);
      W=p.width; H=p.height; DR=dotRadius(W);
      for (let i=0; i<NUM_PT; i++) particles.push(new Particle(W, H));
      computeTargets(W, H);
      // Entrada: cada dot cae desde arriba en diagonal hacia su posición
      dots.forEach(d => {
        const offsetX = (d.tx - W * 0.5) * 0.7;
        d.cx = d.tx + offsetX + (Math.random()-0.5)*30;
        d.cy = -H * 0.15 - Math.random()*H*0.2;
        d.alpha = 0;
        d.delay = Math.floor(Math.random()*55);
      });
    };

    function dotRadius(W) { return Math.max(2.2, Math.min(4, W/310)); }

    /* ── Glow sutil: solo en dark mode, solo en keyword activo ─ */
    function drawGlowDot(x, y, r, rgb, alpha, glowing) {
      const isDark = document.documentElement.dataset.theme !== 'light';
      if (glowing && isDark) {
        p.fill(rgb.r, rgb.g, rgb.b, alpha * 0.18);
        p.circle(x, y, r * 3.2);
      }
      p.fill(rgb.r, rgb.g, rgb.b, alpha);
      p.circle(x, y, r * 2);
    }

    /* ── Eje días+semanas (temporal detalle) ────────── */
    function drawDayAxis() {
      if (!_dayAxisParams) return;
      const { daysInMonth, bw, MB } = _dayAxisParams;
      p.noStroke();
      p.textFont('Courier New');
      p.textSize(Math.max(9, Math.min(11, W / 80)));
      const [tr,tg,tb] = p5txt();
      const chartBottom = H - MB;

      // Semanas: bloques de 7 días
      let w = 0;
      for (let d0 = 1; d0 <= daysInMonth; d0 += 7, w++) {
        const d1  = Math.min(d0 + 6, daysInMonth);
        const x0  = M.left + (d0 - 1) * bw;
        const x1  = M.left + d1 * bw;
        const mid = (x0 + x1) / 2;

        // Banda alternada
        if (w % 2 === 0) {
          p.fill(tr, tg, tb, 9);
          p.rect(x0, M.top, x1 - x0, chartBottom - M.top);
        }

        // Separador vertical al inicio de semana (excepto la primera)
        if (d0 > 1) {
          p.stroke(tr, tg, tb, 35); p.strokeWeight(1);
          p.line(x0, M.top, x0, chartBottom);
          p.noStroke();
        }

        // Rango de días ej. "1-7", "8-14"
        p.fill(tr, tg, tb, 210);
        p.textAlign(p.CENTER);
        p.text(`${d0}–${d1}`, mid, chartBottom + 16);

        // Línea de delimitación inferior para esa semana
        p.stroke(tr, tg, tb, 18); p.strokeWeight(1);
        p.line(x0, chartBottom, x1, chartBottom);
        p.noStroke();
      }

      // Línea base
      p.stroke(tr, tg, tb, 40); p.strokeWeight(1);
      p.line(M.left, chartBottom, W - M.right, chartBottom);
      p.noStroke();
    }

    /* ── Eje X ───────────────────────────────────────── */
    function drawAxis() {
      if (dayStackMo >= 0) { drawDayAxis(); return; }
      p.noStroke();
      p.textFont('Courier New');
      p.textSize(Math.max(7.5, Math.min(10, W/170)));
      const [tr,tg,tb] = p5txt();

      if (viewMode === 'month') {
        const bw = (W - M.left - M.right) / MO_LABEL.length;
        for (let i=0; i<MO_LABEL.length; i++) {
          const x = M.left + i*bw;
          if (i%2===0) { p.fill(tr,tg,tb,6); p.rect(x, M.top, bw, H-M.top-M.bottom); }
          p.fill(tr,tg,tb,210); p.textAlign(p.CENTER);
          p.text(MO_LABEL[i], x+bw/2, H-M.bottom+14);
        }
      } else {
        const t0=DAY_KEYS[0].getTime(), t1=DAY_KEYS[DAY_KEYS.length-1].getTime(), span=t1-t0||1;
        const xL=M.left+28, xR=W-M.right-28;
        const months = monthRange(DAY_KEYS[0], DAY_KEYS[DAY_KEYS.length-1]);
        months.forEach((mo, i) => {
          const x = xL + (mo.getTime()-t0)/span*(xR-xL);
          if (i%2===0 && i+1<months.length) {
            const xn = xL + (months[i+1].getTime()-t0)/span*(xR-xL);
            p.fill(tr,tg,tb,6); p.rect(x, M.top, xn-x, H-M.top-M.bottom);
          }
          if (x>M.left+8 && x<W-M.right-8) {
            p.stroke(tr,tg,tb,20); p.strokeWeight(1);
            p.line(x, M.top, x, H-M.bottom); p.noStroke();
          }
          p.fill(tr,tg,tb,210); p.textAlign(p.LEFT);
          p.text(`${MES_ES[mo.getMonth()]} ${String(mo.getFullYear()).slice(2)}`, x+4, H-M.bottom+14);
        });
      }
    }

    /* ── Dots ───────────────────────────────────────── */
    let settled = false;
    // glowing = hay un keyword seleccionado (no "todos")
    let activeKwForGlow = -1;

    function drawDots() {
      p.noStroke();
      let moving = false;

      dots.forEach(d => {
        // Stagger de entrada/scatter: esperar delay frames antes de moverse
        if (d.delay > 0) { d.delay--; moving = true; return; }

        const dxAbs = Math.abs(d.cx-d.tx), dyAbs = Math.abs(d.cy-d.ty), daAbs = Math.abs(d.alpha-d.targetAlpha);
        if (dxAbs>0.35 || dyAbs>0.35 || daAbs>0.5) {
          // Lerp más lento para dots en background (suavidad), rápido para activos
          const spd = d.targetAlpha > 50 ? 0.062 : 0.045;
          d.cx    += (d.tx-d.cx)*spd;
          d.cy    += (d.ty-d.cy)*spd;
          d.alpha += (d.targetAlpha-d.alpha)*0.08;
          moving   = true;
        } else {
          d.cx=d.tx; d.cy=d.ty; d.alpha=d.targetAlpha;
        }

        if (d.alpha < 1) return;

        // Glow solo en dots del keyword activo, no en "mostrar todos"
        const glowing = activeKwForGlow >= 0 && d.ki === activeKwForGlow;
        drawGlowDot(d.cx, d.cy, DR, palRgb(d.ki), d.alpha, glowing);
      });

      settled = !moving;
    }

    /* ── Partículas ─────────────────────────────────── */
    function drawParticles() {
      p.noStroke();
      const byKi = Array.from({length: KW.length}, () => []);
      particles.forEach(pt => { pt.update(W, H); byKi[pt.ki].push(pt); });
      byKi.forEach((group, ki) => {
        if (!group.length) return;
        const rgb = palRgb(ki);
        group.forEach(pt => {
          const fade = pt.age<30 ? pt.age/30 : pt.age>pt.life-30 ? (pt.life-pt.age)/30 : 1;
          p.fill(rgb.r, rgb.g, rgb.b, pt.base*fade);
          p.circle(pt.x, pt.y, pt.r*2);
        });
      });
    }

    /* ── Hover ──────────────────────────────────────── */
    function exploreVisible() {
      return document.getElementById('panel-explore').style.display !== 'none';
    }
    p.mouseMoved = () => {
      if (!exploreVisible()) { hideTip(); return; }
      if (p.mouseY<0||p.mouseY>H||p.mouseX<0||p.mouseX>W) { hideTip(); return; }
      const rect = chartEl.getBoundingClientRect();
      let best=null, bestD=12;
      for (const d of dots) {
        if (d.targetAlpha<100) continue;
        const dist=Math.hypot(p.mouseX-d.cx, p.mouseY-d.cy);
        if (dist<bestD) { bestD=dist; best=d; }
      }
      if (best!==hoveredDot) {
        hoveredDot=best;
        if (best) showTip(best, p.mouseX+rect.left, p.mouseY+rect.top);
        else hideTip();
      }
    };
    p.mouseOut = hideTip;

    /* ── Click — abrir modal ────────────────────────── */
    p.mousePressed = () => {
      if (!exploreVisible()) return;
      if (p.mouseY<0||p.mouseY>H||p.mouseX<0||p.mouseX>W) return;
      let best=null, bestD=14;
      for (const d of dots) {
        if (d.targetAlpha<100) continue;
        const dist=Math.hypot(p.mouseX-d.cx, p.mouseY-d.cy);
        if (dist<bestD) { bestD=dist; best=d; }
      }
      if (best) openModal(best);
    };

    /* ── draw loop ──────────────────────────────────── */
    function cssVar(name, fallback) {
      const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      return v !== '' ? +v : fallback;
    }
    function p5bg()  { return [cssVar('--p5-bg-r',7),  cssVar('--p5-bg-g',0),   cssVar('--p5-bg-b',26)]; }
    function p5txt() { return [cssVar('--p5-txt-r',255), cssVar('--p5-txt-g',255), cssVar('--p5-txt-b',255)]; }

    p.draw = () => {
      p.background(...p5bg());
      drawAxis();
      drawParticles();
      drawDots();
      if (settled) p.frameRate(10);
      else          p.frameRate(30);
    };

    p.windowResized = () => {
      W=chartEl.clientWidth; H=chartEl.clientHeight;
      p.resizeCanvas(W, H);
      DR=dotRadius(W);
      if (dayStackMo >= 0) computeTargetsDayStack(dayStackMo);
      else computeTargets(W, H);
      settled=false; p.frameRate(30);
    };

    chartEl._wake = (kwForGlow) => {
      activeKwForGlow = kwForGlow !== undefined ? kwForGlow : activeKwForGlow;
      settled=false; p.frameRate(30);
    };

  }, chartEl);

  /* ── Filter ──────────────────────────────────────── */
  function applyFilter(kw) {
    if (kw===curKw) return; curKw=kw;
    const lbl = document.getElementById('klbl');
    lbl.textContent = kw>=0 ? KW[kw] : '';
    lbl.style.color = kw>=0 ? CL(kw)+'88' : '';

    if (navMode === 'time') {
      // En temporal: keyword es filtro secundario sobre el mes activo
      // Dots fuera del mes siempre invisible; dentro del mes filtrar por keyword
      const mo = curMo;
      const cW = chartEl.clientWidth, cH = chartEl.clientHeight;
      dots.forEach(d => {
        if (d.mi !== mo) { d.targetAlpha = 0; d.delay = 0; return; }
        if (kw >= 0 && d.ki !== kw) { d.targetAlpha = 0; d.delay = 0; }
      });
      const active = dots
        .filter(d => d.mi === mo && (kw === -1 || d.ki === kw))
        .sort((a, b) => a.tx - b.tx);
      active.forEach((d, i) => {
        const offsetX = (d.tx - cW * 0.5) * 0.65;
        d.cx = d.tx + offsetX + (Math.random()-0.5)*40;
        d.cy = -cH * 0.1 - Math.random()*cH*0.15;
        d.alpha = 0;
        d.targetAlpha = 210;
        d.delay = Math.floor(i / active.length * 75);
      });
      KW.forEach((_,i) => { const e=document.getElementById(`li${i}`); if(e) e.style.opacity=(kw===-1||i===kw)?1:.22; });
      chartEl._wake?.(kw >= 0 ? kw : -1);
      return;
    }

    if (kw === -1) {
      const sorted = [...dots].sort((a, b) => a.tx - b.tx);
      sorted.forEach((d, i) => {
        d.targetAlpha = 210;
        d.delay = Math.floor(i / sorted.length * 70);
      });
    } else {
      const cW = chartEl.clientWidth, cH = chartEl.clientHeight;
      dots.forEach(d => {
        if (d.ki !== kw) { d.targetAlpha = 18; d.delay = 0; }
      });
      const active = dots.filter(d => d.ki === kw).sort((a, b) => a.tx - b.tx);
      active.forEach((d, i) => {
        const offsetX = (d.tx - cW * 0.5) * 0.65;
        d.cx = d.tx + offsetX + (Math.random()-0.5)*40;
        d.cy = -cH * 0.1 - Math.random()*cH*0.15;
        d.alpha = 0;
        d.targetAlpha = 210;
        d.delay = Math.floor(i / active.length * 75);
      });
    }

    KW.forEach((_,i) => { const e=document.getElementById(`li${i}`); if(e) e.style.opacity=(kw===-1||i===kw)?1:.22; });
    document.querySelectorAll('.sec').forEach((s,i) => {
      const sk=SECS[i]?.kw;
      s.style.background      = i===kw+1 ? CL(sk)+'09' : 'transparent';
      s.style.borderLeftColor = i===kw+1 ? CL(sk)+'77' : sk>=0 ? CL(sk)+'22' : 'transparent';
    });
    chartEl._wake?.(kw);
  }

  function switchView(mode) {
    if (mode===viewMode) return;
    viewMode=mode;
    document.getElementById('btn-month').classList.toggle('active', mode==='month');
    document.getElementById('btn-day').classList.toggle('active',   mode==='day');
    updateStats();
    computeTargets(chartEl.clientWidth, chartEl.clientHeight);
    chartEl._wake?.();
  }

  /* ── Filtro temporal: highlight por mes ─────────── */
  function applyTimeMo(mo) {
    if (mo===curMo) return; curMo=mo;
    curKw = -99; // reset keyword filter al cambiar de mes
    KW.forEach((_,i) => { const e=document.getElementById(`li${i}`); if(e) e.style.opacity=1; });
    dayStackMo = mo; // -1 = panorama mes, >= 0 = detalle días

    if (mo === -1) {
      // Volver a vista de meses
      computeTargets(chartEl.clientWidth, chartEl.clientHeight);
      const sorted = [...dots].sort((a,b) => a.tx - b.tx);
      sorted.forEach((d, i) => {
        d.targetAlpha = 210;
        d.delay = Math.floor(i / sorted.length * 70);
      });
    } else {
      // Recalcular targets en layout día-stack y hacer fly-in progresivo
      computeTargetsDayStack(mo);
      const cW = chartEl.clientWidth, cH = chartEl.clientHeight;
      dots.forEach(d => {
        if (d.mi !== mo) { d.targetAlpha = 0; d.delay = 0; }
      });
      const active = dots.filter(d => d.mi === mo).sort((a, b) => a.tx - b.tx);
      active.forEach((d, i) => {
        const offsetX = (d.tx - cW * 0.5) * 0.65;
        d.cx = d.tx + offsetX + (Math.random()-0.5)*40;
        d.cy = -cH * 0.1 - Math.random()*cH*0.15;
        d.alpha = 0;
        d.targetAlpha = 210;
        d.delay = Math.floor(i / active.length * 75);
      });
    }
    // Highlight sección activa
    document.querySelectorAll('.sec[data-mode="time"]').forEach((s, i) => {
      s.style.background      = i===mo+1 ? '#00e5a009' : 'transparent';
      s.style.borderLeftColor = i===mo+1 ? '#00e5a077' : i>0 ? '#00e5a022' : 'transparent';
    });
    chartEl._wake?.(-1); // no keyword-specific glow en modo temporal
  }

  /* ── Cambio de modo nav ──────────────────────────── */
  function switchNavMode(mode) {
    if (mode===navMode) return;
    navMode=mode;
    curKw=-99; curMo=-99; dayStackMo=-1;
    document.getElementById('btn-kw').classList.toggle('active',   mode==='kw');
    document.getElementById('btn-time').classList.toggle('active', mode==='time');
    renderSections();
    updateLegVisibility();
    window.scrollTo({ top:0, behavior:'smooth' });
    if (mode==='kw')   setTimeout(() => applyFilter(-1), 120);
    else               setTimeout(() => applyTimeMo(-1), 120);
  }

  /* ── Events ─────────────────────────────────────── */
  sel.addEventListener('change', () => applyFilter(parseInt(sel.value)));
  document.getElementById('btn-month').addEventListener('click', () => switchView('month'));
  document.getElementById('btn-day').addEventListener('click',   () => switchView('day'));
  document.getElementById('btn-kw').addEventListener('click',    () => switchNavMode('kw'));
  document.getElementById('btn-time').addEventListener('click',  () => switchNavMode('time'));

  const SH=380;
  window.addEventListener('scroll', () => {
    if (navMode === 'kw') {
      const idx = Math.min(Math.floor(window.scrollY/SH), SECS.length-1);
      const kw  = SECS[idx].kw; sel.value=kw; applyFilter(kw);
    } else {
      const idx = Math.min(Math.floor(window.scrollY/SH), SECS_TIME.length-1);
      applyTimeMo(SECS_TIME[idx].mo);
    }
  });

  updateLegVisibility();
  setTimeout(() => applyFilter(-1), 100);
}

/* ══════════════════════════════════════════════════════
   BOOTSTRAP — Explorar
   ══════════════════════════════════════════════════════ */
(async () => {
  try {
    document.getElementById('loading-text').textContent = 'Cargando datos...';
    const raw       = await loadData();
    const processed = processData(raw);
    document.getElementById('loading').style.opacity = 0;
    setTimeout(() => document.getElementById('loading').style.display='none', 500);
    initViz(processed);
  } catch (err) {
    document.getElementById('loading-text').textContent = 'Error al cargar';
    document.getElementById('error-msg').style.display = 'block';
    document.getElementById('error-msg').textContent   = err.message;
    document.querySelector('.spinner').style.display   = 'none';
  }
})();

/* ══════════════════════════════════════════════════════
   TAB SWITCHER
   ══════════════════════════════════════════════════════ */
(function () {
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = {
    explore: document.getElementById('panel-explore'),
    query:   document.getElementById('panel-query'),
  };
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      const target = btn.dataset.tab;
      Object.entries(panels).forEach(([key, el]) => {
        el.style.display = key === target ? 'block' : 'none';
      });
      document.getElementById('tooltip').style.opacity = 0;
    });
  });
})();

/* ══════════════════════════════════════════════════════
   THEME TOGGLE
   ══════════════════════════════════════════════════════ */
(function () {
  const btn = document.getElementById('theme-toggle');
  let dark = true;
  btn.addEventListener('click', () => {
    dark = !dark;
    document.documentElement.dataset.theme = dark ? '' : 'light';
    btn.textContent = dark ? 'Claro' : 'Oscuro';
    document.dispatchEvent(new CustomEvent('themechange'));
  });
})();

/* ══════════════════════════════════════════════════════
   RAG — PESTAÑA CONSULTAR
   ══════════════════════════════════════════════════════ */
(function () {
  const input      = document.getElementById('rag-input');
  const btn        = document.getElementById('rag-btn');
  const empty      = document.getElementById('rag-empty');
  const spinner    = document.getElementById('rag-spinner');
  const answerWrap = document.getElementById('rag-answer-wrap');
  const answerEl   = document.getElementById('rag-answer');
  const srcToggle  = document.getElementById('sources-toggle');
  const srcList    = document.getElementById('sources-list');

  // Chips
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      input.value = chip.textContent.trim();
      runQuery();
    });
  });

  // Submit
  btn.addEventListener('click', runQuery);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') runQuery(); });

  // Sources toggle
  let srcOpen = false;
  srcToggle.addEventListener('click', () => {
    srcOpen = !srcOpen;
    srcList.style.display = srcOpen ? 'block' : 'none';
    srcToggle.textContent = (srcOpen ? '▾' : '▸') + ' Fuentes consultadas';
  });

  function setLoading(on) {
    btn.disabled       = on;
    spinner.style.display    = on ? 'block' : 'none';
    empty.style.display      = 'none';
    answerWrap.style.display = on ? 'none' : '';
  }

  function renderSources(sources) {
    srcList.innerHTML = '';
    srcOpen = false;
    srcToggle.textContent = '▸ Fuentes consultadas';
    srcList.style.display = 'none';
    sources.forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'source-item';
      el.innerHTML = `
        <div class="source-frase">"${(s.content || '').slice(0, 160)}${s.content?.length > 160 ? '…' : ''}"</div>
        <div class="source-meta">
          [${i+1}] ${s.fecha || '?'} · ${s.subject || '?'} · ${s.keywords || '?'}
          · score ${s.puntuacion_total ?? '?'} · ${s.min_sec || '?'}
        </div>`;
      srcList.appendChild(el);
    });
  }

  async function runQuery() {
    const q = input.value.trim();
    if (!q) return;
    setLoading(true);
    try {
      const res = await fetch(`${WORKER_URL}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || res.statusText);
      }
      const { answer, sources } = await res.json();
      answerEl.textContent = answer;
      renderSources(sources || []);
      setLoading(false);
      answerWrap.style.display = 'block';
    } catch (err) {
      setLoading(false);
      answerWrap.style.display = 'block';
      answerEl.textContent = `Error: ${err.message}`;
      srcList.innerHTML = '';
    }
  }
})();
</script>
</body>
